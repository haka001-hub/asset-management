<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하카코리아 자산관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; background: #f0f2f5; color: #222; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 230px; min-width: 230px; background: #1a2332; color: #fff;
    display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 10;
  }
  #sidebar .logo {
    padding: 24px 20px 20px; border-bottom: 1px solid #2e3f55;
    font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
  }
  #sidebar .logo span { color: #4a90d9; }
  #sidebar nav { flex: 1; padding: 12px 0; }
  #sidebar nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 22px; color: #b0bec5; text-decoration: none;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.15s, color 0.15s; border-left: 3px solid transparent;
  }
  #sidebar nav a:hover { background: #243447; color: #fff; }
  #sidebar nav a.active { background: #243447; color: #4a90d9; border-left-color: #4a90d9; }
  #sidebar nav a .nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
  #sidebar .sidebar-footer { padding: 16px 20px; font-size: 11px; color: #4a6080; border-top: 1px solid #2e3f55; }

  /* Main content */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid #e0e6ee; padding: 0 28px;
    height: 58px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .topbar h1 { font-size: 18px; font-weight: 700; color: #1a2332; }
  .topbar .count-badge {
    background: #e8f0fb; color: #4a90d9; padding: 4px 12px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
  }

  /* Page content */
  .page { display: none; flex: 1; overflow-y: auto; padding: 24px 28px; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    padding: 20px 24px; margin-bottom: 20px;
  }

  /* Filter bar */
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filter-bar input[type=text], .filter-bar select {
    padding: 8px 12px; border: 1px solid #d0d7e3; border-radius: 6px;
    font-size: 13px; color: #333; background: #fff;
    outline: none; transition: border 0.15s;
  }
  .filter-bar input[type=text]:focus, .filter-bar select:focus { border-color: #4a90d9; }
  .filter-bar input[type=text] { min-width: 200px; }
  .filter-bar select { min-width: 140px; }
  .filter-bar .btn-reset {
    padding: 8px 14px; border: 1px solid #d0d7e3; border-radius: 6px;
    background: #f7f9fc; color: #555; font-size: 13px; cursor: pointer;
  }
  .filter-bar .btn-reset:hover { background: #e8f0fb; color: #4a90d9; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    background: #f0f4fa; color: #4a5568; font-weight: 600; font-size: 12.5px;
    padding: 11px 14px; text-align: left; border-bottom: 2px solid #dce3ee;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #eef1f6; transition: background 0.1s; }
  tbody tr:hover { background: #f7faff; }
  tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
  tbody td .finalcode { font-family: monospace; color: #4a90d9; font-weight: 600; font-size: 13px; }
  .no-data { text-align: center; color: #aaa; padding: 48px 0; font-size: 15px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #4a90d9; color: #fff; }
  .btn-primary:hover { background: #3578c7; }
  .btn-edit { background: #f0f4fa; color: #4a90d9; border: 1px solid #d0dce8; padding: 5px 11px; font-size: 12px; }
  .btn-edit:hover { background: #e8f0fb; }
  .btn-delete { background: #e74c3c; color: #fff; border: none; padding: 5px 11px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.15s; }
  .btn-delete:hover { background: #c0392b; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-secondary { background: #f0f4fa; color: #555; border: 1px solid #d0d7e3; }
  .btn-secondary:hover { background: #e2e8f0; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; width: 480px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18); animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }
  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid #eef1f6;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: #1a2332; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: #aaa; line-height: 1; padding: 0 4px; }
  .modal-close:hover { color: #555; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 14px 24px 20px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #eef1f6; }

  /* Form fields */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12.5px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  .form-group input[type=text],
  .form-group input[type=date],
  .form-group select {
    width: 100%; padding: 9px 12px; border: 1px solid #d0d7e3; border-radius: 6px;
    font-size: 14px; color: #333; background: #fff; outline: none;
    transition: border 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: #4a90d9; }
  .form-group input[readonly] { background: #f7f9fc; color: #888; cursor: not-allowed; }
  .form-group .finalcode-preview {
    font-family: monospace; font-size: 18px; font-weight: 700; color: #4a90d9;
    background: #e8f0fb; padding: 10px 16px; border-radius: 8px;
    text-align: center; letter-spacing: 1px; margin-top: 4px;
  }

  /* Radio group */
  .radio-group { display: flex; gap: 20px; }
  .radio-group label { display: flex; align-items: center; gap: 6px; font-weight: 400; font-size: 14px; cursor: pointer; color: #333; }
  .radio-group input[type=radio] { accent-color: #4a90d9; width: 16px; height: 16px; }

  /* 출고 등록 page */
  .register-card { max-width: 680px; }

  /* 스티커 page */
  .sticker-search-bar { display: flex; gap: 10px; margin-bottom: 20px; position: relative; }
  .sticker-search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #d0d7e3; border-radius: 6px; font-size: 14px; outline: none; }
  .sticker-search-bar input:focus { border-color: #4a90d9; }
  .sticker-results { margin-bottom: 16px; }
  .sticker-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border: 1px solid #eef1f6; border-radius: 6px;
    margin-bottom: 6px; background: #fff; transition: border-color 0.15s;
  }
  .sticker-item:hover { border-color: #4a90d9; }
  .sticker-item input[type=checkbox] { accent-color: #4a90d9; width: 16px; height: 16px; flex-shrink: 0; }
  .sticker-item .item-info { flex: 1; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .sticker-item .item-finalcode { font-family: monospace; font-weight: 700; color: #4a90d9; font-size: 13px; min-width: 130px; }
  .sticker-item .item-col { font-size: 12.5px; color: #555; }
  .sticker-item .item-col span { font-weight: 600; color: #333; }
  .sticker-actions { display: flex; gap: 10px; align-items: center; }
  .select-all-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; margin-bottom: 12px; cursor: pointer; }
  .select-all-wrap input { accent-color: #4a90d9; width: 15px; height: 15px; }
  .sticker-table-header {
    display: flex; align-items: center; gap: 16px; padding: 8px 14px;
    background: #f0f4fa; border-radius: 6px; margin-bottom: 6px;
    font-size: 12px; font-weight: 600; color: #4a5568;
  }
  .sticker-table-header .h-check { width: 16px; flex-shrink: 0; }
  .sticker-table-header .h-code { min-width: 130px; }
  .sticker-table-header .h-col { flex: 1; }

  /* Autocomplete dropdown */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid #d0d7e3; border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 500;
    max-height: 200px; overflow-y: auto; margin-top: 2px;
  }
  .autocomplete-list .ac-item {
    padding: 9px 12px; font-size: 13.5px; color: #333; cursor: pointer;
    border-bottom: 1px solid #f0f2f5;
  }
  .autocomplete-list .ac-item:last-child { border-bottom: none; }
  .autocomplete-list .ac-item:hover { background: #e8f0fb; color: #4a90d9; }

  /* Toast */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #1a2332; color: #fff; padding: 12px 24px; border-radius: 8px;
    font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  #toast.success { background: #27ae60; }
  #toast.error { background: #e74c3c; }

  /* Print styles */
  @media print {
    body, #main, #sidebar { display: block !important; }
    #sidebar, .topbar, .no-print { display: none !important; }
    #main { height: auto; overflow: visible; }
    .page { display: none !important; }
    #page-sticker { display: block !important; }
    .sticker-search-bar, .sticker-results, .sticker-actions, .select-all-wrap, .card > .filter-bar,
    .sticker-table-header, .sticker-print-btn-wrap { display: none !important; }
    .print-area { display: block !important; }
  }
  .print-area { display: none; }

  @media print {
    @page { size: A4; margin: 0; }
    /* 라벨=63.5×38.1mm, 3열×7행
       좌=0.08mm, 우=0.07mm, 행간격=0.03mm, 상단=1.6mm, 하단=1.3mm, 열간격=없음 */
    .sticker-page {
      width: 210mm;
      padding: 1.6mm 0.07mm 1.3mm 0.08mm;
      box-sizing: border-box;
    }
    .sticker-grid {
      display: grid !important;
      grid-template-columns: repeat(3, 63.5mm);
      column-gap: 0.03mm;
      row-gap: 0;
    }
    .sticker-cell {
      width: 63.5mm; height: 38.1mm;
      border: 0.3pt solid #bbb;
      padding: 2mm 3mm;
      page-break-inside: avoid;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      font-size: 7pt; line-height: 1.45;
      overflow: hidden; box-sizing: border-box;
    }
    .sticker-cell .s-brand { font-weight: 700; font-size: 7.5pt; letter-spacing: 1px; color: #1a2332; margin-bottom: 0.5mm; }
    .sticker-cell .s-code { font-weight: 700; font-size: 8.5pt; color: #1a5fa8; margin: 0.8mm 0; font-family: monospace; }
    .sticker-cell .s-row { font-size: 6.5pt; color: #333; width: 100%; text-align: center; }
    .sticker-cell .s-row span { font-weight: 600; }
  }
  .sticker-grid { display: none; }
  .sticker-page { display: none; }
  @media print { .sticker-page { display: block !important; } }

  /* 부서별 선택 모달 */
  .dept-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000;
    align-items: center; justify-content: center;
  }
  .dept-modal-overlay.open { display: flex; }
  .dept-modal {
    background: #fff; border-radius: 12px; width: 720px; max-width: 95vw;
    max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .dept-modal-header {
    padding: 18px 24px; border-bottom: 1px solid #eef1f6;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dept-modal-header h3 { font-size: 16px; font-weight: 700; color: #1a2332; }
  .dept-modal-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
  .dept-section-title {
    font-size: 12px; font-weight: 700; color: #4a90d9;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 12px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e8f0fb;
  }
  .dept-check-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px; margin-bottom: 8px;
  }
  .dept-check-item {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 10px; border: 1px solid #eef1f6; border-radius: 6px;
    cursor: pointer; font-size: 12.5px; color: #333;
    transition: background 0.12s, border-color 0.12s;
  }
  .dept-check-item:hover { background: #f0f6ff; border-color: #b3d0f5; }
  .dept-check-item input[type=checkbox] { accent-color: #4a90d9; flex-shrink: 0; }
  .dept-check-item.checked { background: #e8f0fb; border-color: #4a90d9; }
  .dept-modal-footer {
    padding: 14px 24px; border-top: 1px solid #eef1f6;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .dept-select-info { font-size: 13px; color: #4a90d9; font-weight: 600; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #c5cdd8; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: #f0f2f5; }

  /* ═══ AMS 임베드 모드 (iframe 내부) — 사이드바/상단바 숨김 + 다크 테마 ═══ */
  body.embedded { background: #0a0e1a; color: #e2e8f0; }
  body.embedded #sidebar  { display: none !important; }
  body.embedded .topbar   { display: none !important; }
  body.embedded #main     { background: #0a0e1a; height: 100vh; overflow: hidden; }
  body.embedded .page     { background: transparent; }

  /* 카드 */
  body.embedded .card { background: #111827; border: 1px solid #2a3a52; box-shadow: none; }

  /* 필터바 */
  body.embedded .filter-bar input[type=text],
  body.embedded .filter-bar select { background: #1a2235; border-color: #2a3a52; color: #e2e8f0; }
  body.embedded .filter-bar input[type=text]:focus,
  body.embedded .filter-bar select:focus { border-color: #3b82f6; }
  body.embedded .filter-bar .btn-reset { background: #1a2235; border-color: #2a3a52; color: #94a3b8; }
  body.embedded .filter-bar .btn-reset:hover { background: #1f2d42; color: #60a5fa; }

  /* 테이블 */
  body.embedded thead th { background: #1a2235; color: #64748b; border-bottom-color: #2a3a52; }
  body.embedded tbody tr { border-bottom-color: #1f2d42; }
  body.embedded tbody tr:hover { background: #1a2235; }
  body.embedded tbody td { color: #94a3b8; }
  body.embedded tbody td .finalcode { color: #60a5fa; }
  body.embedded .no-data { color: #64748b; }

  /* 버튼 */
  body.embedded .btn-primary { background: #3b82f6; color: #fff; }
  body.embedded .btn-primary:hover { background: #2563eb; }
  body.embedded .btn-edit { background: rgba(59,130,246,.1); color: #60a5fa; border-color: rgba(59,130,246,.3); }
  body.embedded .btn-edit:hover { background: rgba(59,130,246,.2); }
  body.embedded .btn-secondary { background: #1a2235; color: #94a3b8; border-color: #2a3a52; }
  body.embedded .btn-secondary:hover { background: #1f2d42; color: #e2e8f0; }
  body.embedded .btn-delete { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
  body.embedded .btn-delete:hover { background: rgba(239,68,68,.25); }

  /* 모달 */
  body.embedded .modal { background: #111827; }
  body.embedded .modal-header { border-bottom-color: #2a3a52; }
  body.embedded .modal-header h3 { color: #e2e8f0; }
  body.embedded .modal-close { color: #64748b; }
  body.embedded .modal-close:hover { color: #e2e8f0; }
  body.embedded .modal-footer { border-top-color: #2a3a52; }
  body.embedded .modal-overlay { background: rgba(0,0,0,0.65); }

  /* 폼 */
  body.embedded .form-group label { color: #94a3b8; }
  body.embedded .form-group input[type=text],
  body.embedded .form-group input[type=date],
  body.embedded .form-group select { background: #1a2235; border-color: #2a3a52; color: #e2e8f0; }
  body.embedded .form-group input:focus,
  body.embedded .form-group select:focus { border-color: #3b82f6; }
  body.embedded .form-group input[readonly] { background: #0f1729; color: #64748b; }
  body.embedded .form-group .finalcode-preview { background: rgba(59,130,246,.12); color: #60a5fa; }
  body.embedded .radio-group label { color: #94a3b8; }
  body.embedded .radio-group input[type=radio] { accent-color: #3b82f6; }
  body.embedded h2 { color: #e2e8f0 !important; }
  body.embedded label { color: #94a3b8; }

  /* 스티커 검색 */
  body.embedded .sticker-search-bar input { background: #1a2235; border-color: #2a3a52; color: #e2e8f0; }
  body.embedded .sticker-search-bar input:focus { border-color: #3b82f6; }
  body.embedded .sticker-item { background: #111827; border-color: #2a3a52; }
  body.embedded .sticker-item:hover { border-color: #3b82f6; }
  body.embedded .sticker-item .item-col { color: #64748b; }
  body.embedded .sticker-item .item-col span { color: #94a3b8; }
  body.embedded .sticker-item .item-finalcode { color: #60a5fa; }
  body.embedded .sticker-table-header { background: #1a2235; color: #64748b; }
  body.embedded .select-all-wrap { color: #94a3b8; }

  /* 자동완성 드롭다운 */
  body.embedded .autocomplete-list { background: #1a2235; border-color: #2a3a52; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  body.embedded .autocomplete-list .ac-item { color: #94a3b8; border-bottom-color: #2a3a52; }
  body.embedded .autocomplete-list .ac-item:hover { background: #1f2d42; color: #60a5fa; }

  /* 부서 선택 모달 */
  body.embedded .dept-modal { background: #111827; }
  body.embedded .dept-modal-header { border-bottom-color: #2a3a52; }
  body.embedded .dept-modal-header h3 { color: #e2e8f0; }
  body.embedded .dept-section-title { color: #60a5fa; border-bottom-color: rgba(59,130,246,.2); }
  body.embedded .dept-check-item { border-color: #2a3a52; color: #94a3b8; background: transparent; }
  body.embedded .dept-check-item:hover { background: #1a2235; border-color: #3b82f6; }
  body.embedded .dept-check-item.checked { background: rgba(59,130,246,.12); border-color: #3b82f6; color: #60a5fa; }
  body.embedded .dept-modal-footer { border-top-color: #2a3a52; }
  body.embedded .dept-select-info { color: #60a5fa; }

  /* 품목 배지 */
  body.embedded span[style*="background:#eef4ff"] { background: rgba(59,130,246,.15) !important; color: #60a5fa !important; }

  /* 스크롤바 다크 */
  body.embedded ::-webkit-scrollbar-thumb { background: #2a3a52; }
  body.embedded ::-webkit-scrollbar-track { background: #0a0e1a; }

  /* 토스트 */
  body.embedded #toast { background: #1a2235; }
  body.embedded #toast.success { background: #065f46; }
  body.embedded #toast.error { background: #7f1d1d; }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="logo">&#x1F3E2; <span>하카코리아</span> 자산관리</div>
  <nav>
    <a class="nav-link active" data-page="page-bonsa" href="#">
      <span class="nav-icon">&#x1F3E2;</span> 본사 자산현황
    </a>
    <a class="nav-link" data-page="page-jikyoung" href="#">
      <span class="nav-icon">&#x1F3EA;</span> 직영점 자산현황
    </a>
    <a class="nav-link" data-page="page-register" href="#">
      <span class="nav-icon">&#x2795;</span> 자산/직원 등록
    </a>
    <a class="nav-link" data-page="page-sticker" href="#">
      <span class="nav-icon">&#x1F3F7;</span> 스티커 출력

// ===================== STATE =====================
let DATA = [];
const LS_KEY = 'haka_assets';
const LS_ITEM_NAMES_KEY = 'haka_item_names';

function loadData() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) {
    try { DATA = JSON.parse(saved); return; } catch(e) {}
  }
  DATA = JSON.parse(JSON.stringify(EMBEDDED_DATA));
  saveData();
}

function saveData() {
  localStorage.setItem(LS_KEY, JSON.stringify(DATA));
}

// Custom item names (per itemCode)
function loadCustomItemNames() {
  try {
    const s = localStorage.getItem(LS_ITEM_NAMES_KEY);
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}
function saveCustomItemNames(obj) {
  localStorage.setItem(LS_ITEM_NAMES_KEY, JSON.stringify(obj));
}
function addCustomItemName(itemCode, itemName) {
  if (!itemCode || !itemName) return;
  const obj = loadCustomItemNames();
  if (!obj[itemCode]) obj[itemCode] = [];
  if (!obj[itemCode].includes(itemName)) {
    obj[itemCode].push(itemName);
    saveCustomItemNames(obj);
  }
}
function getItemNamesForCode(itemCode) {
  if (!itemCode) return [];
  // From DATA
  const fromData = [...new Set(DATA.filter(d => d.itemCode === itemCode).map(d => d.item).filter(Boolean))];
  // From localStorage
  const custom = loadCustomItemNames();
  const fromCustom = custom[itemCode] || [];
  // Merge and deduplicate
  const merged = [...new Set([...fromData, ...fromCustom])].sort();
  return merged;
}

// ===================== NAVIGATION =====================
function navigate(pageId, title) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelector('[data-page="' + pageId + '"]').classList.add('active');
  document.getElementById('topbar-title').textContent = title;
  if (pageId === 'page-bonsa') renderBonsa();
  if (pageId === 'page-jikyoung') renderJikyoung();
  if (pageId === 'page-register') initRegisterForm();
}

document.querySelectorAll('.nav-link').forEach(a => {
  a.addEventListener('click', function(e) {
    e.preventDefault();
    const page = this.dataset.page;
    const titles = {
      'page-bonsa': '본사 자산현황',
      'page-jikyoung': '직영점 자산현황',
      'page-register': '자산/직원 등록',
      'page-sticker': '스티커 출력'
    };
    navigate(page, titles[page]);
  });
});

// ===================== HELPERS =====================
function getItemName(code) {
  const found = ITEM_CODES.find(i => i.code === code);
  return found ? found.name : code;
}
function getDeptName(code) {
  const found = DEPTS.find(d => d.code === code);
  return found ? found.name : code;
}
function getStoreName(code) {
  const found = STORES.find(s => s.code === code);
  return found ? found.name : code;
}
function formatDate(d) {
  if (!d || d === '-') return '-';
  d = String(d).trim();
  if (d.includes(' ')) d = d.split(' ')[0];
  return d;
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteRecord(idx) {
  const d = DATA[idx];
  if (!d) return;
  const confirmed = confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');
  if (!confirmed) return;

  if (activePage === 'page-jikyoung') { initJikFilters(); renderJikyoung(); }

// ===================== EDIT MODAL =====================
function buildItemCodeOptions(selectedCode) {
  return ITEM_CODES.map(ic =>
    '<option value="' + ic.code + '"' + (ic.code === selectedCode ? ' selected' : '') + '>' + ic.name + ' (' + ic.code + ')</option>'
  ).join('');
}

function buildDeptOptions(org, selectedCode) {
  if (org === '본사') {
    return DEPTS.map(d =>
      '<option value="' + d.code + '"' + (d.code === selectedCode ? ' selected' : '') + '>' + d.name + '</option>'
    ).join('');
  } else {
    return STORES.map(s =>
      '<option value="' + s.code + '"' + (s.code === selectedCode ? ' selected' : '') + '>' + s.name + '</option>'
    ).join('');
  }
}

function openEditModal(idx) {
  const d = DATA[idx];
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-org').value = d.org;

  const deptSel = document.getElementById('edit-dept-select');
  deptSel.innerHTML = buildDeptOptions(d.org, d.code);
  document.getElementById('edit-dept-label').textContent = d.org === '본사' ? '부서' : '직영점명';

  const nameGroup = document.getElementById('edit-name-group');
  nameGroup.style.display = d.org === '본사' ? 'block' : 'none';

  document.getElementById('edit-name').value = d.name || '';

  let dateVal = formatDate(d.date);
  if (dateVal && dateVal !== '-') {
    if (dateVal.match(/^\d{2}-\d{2}-\d{2}$/)) {
      dateVal = '20' + dateVal;
    }
    document.getElementById('edit-date').value = dateVal;
  } else {
    document.getElementById('edit-date').value = '';
  }

  document.getElementById('edit-item').value = d.item || '';

  const itemSel = document.getElementById('edit-itemcode');
  itemSel.innerHTML = buildItemCodeOptions(d.itemCode);

  document.getElementById('edit-finalcode').value = d.finalCode || '';

  document.getElementById('edit-modal').classList.add('open');

  deptSel.onchange = updateEditFinalCode;
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function updateEditFinalCode() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const d = DATA[idx];
  const deptSel = document.getElementById('edit-dept-select');
  const itemSel = document.getElementById('edit-itemcode');
  const newCode = deptSel.value;
  const newItemCode = itemSel.value;

  if (!newCode || !newItemCode) return;

  if (newCode === d.code && newItemCode === d.itemCode) {
    document.getElementById('edit-finalcode').value = d.finalCode;
    return;
  }

  const nextNum = getNextNumExcluding(newCode, newItemCode, idx);
  document.getElementById('edit-finalcode').value = newCode + '-' + newItemCode + '-' + nextNum;
}

function getNextNumExcluding(code, itemCode, excludeIdx) {
  const existing = DATA.filter((d, i) => i !== excludeIdx && d.code == code && d.itemCode == itemCode);
  if (existing.length === 0) return '001';
  const numsFromCode = existing.map(d => {
    const parts = (d.finalCode || '').split('-');
    return parseInt(parts[parts.length-1]) || 0;
  });
  const maxNum = Math.max(...numsFromCode, ...existing.map(d => parseInt(d.num) || 0));
  return String(maxNum + 1).padStart(3, '0');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const d = DATA[idx];

  const deptSel = document.getElementById('edit-dept-select');
  const itemSel = document.getElementById('edit-itemcode');
  const newCode = deptSel.value;
  const newItemCode = itemSel.value;

  let newDept;
  if (d.org === '본사') {
    const found = DEPTS.find(dep => dep.code === newCode);
    newDept = found ? found.name : newCode;
  } else {
    const found = STORES.find(s => s.code === newCode);
    newDept = found ? found.name : newCode;
  }

  let dateVal = document.getElementById('edit-date').value;

  DATA[idx] = {
    ...d,
    dept: d.org === '본사' ? newDept : d.dept,
    name: d.org === '직영점' ? newDept : document.getElementById('edit-name').value,
    date: dateVal || d.date,
    item: document.getElementById('edit-item').value,
    code: newCode,
    itemCode: newItemCode,
    num: (document.getElementById('edit-finalcode').value.split('-')[2] || d.num),
    finalCode: document.getElementById('edit-finalcode').value
  };

  saveData();
  closeEditModal();
  showToast('저장되었습니다.', 'success');

  const activePage = document.querySelector('.page.active').id;
  if (activePage === 'page-bonsa') { initBonsaFilters(); renderBonsa(); }
  if (activePage === 'page-jikyoung') { initJikFilters(); renderJikyoung(); }
}

// Autocomplete helpers
function showAC(id, items, onSelect) {
  const ac = document.getElementById(id);
  if (!items || items.length === 0) { ac.style.display = 'none'; return; }
  ac.innerHTML = items.map((item, i) =>
    '<div class="ac-item" data-i="' + i + '">' + escHtml(typeof item === 'object' ? item.label : item) + '</div>'
  ).join('');
  ac.style.display = 'block';
  ac.querySelectorAll('.ac-item').forEach((el, i) => {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      onSelect(items[i]);
    });
  });
}
function hideAC(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

// Dept autocomplete
function onRegDeptInput() {
  const org = document.querySelector('input[name="reg-org"]:checked').value;
  const val = document.getElementById('reg-dept-input').value.toLowerCase().trim();
  document.getElementById('reg-dept-code').value = '';
  updateFinalCode();

  if (!val) { hideAC('reg-dept-ac'); return; }

  let matches;
  if (org === '본사') {
    matches = DEPTS.filter(d => d.name.toLowerCase().includes(val)).map(d => ({label: d.name, code: d.code}));
  } else {
    matches = STORES.filter(s => s.name.toLowerCase().includes(val)).map(s => ({label: s.name, code: s.code}));
  }

  showAC('reg-dept-ac', matches, function(item) {
    document.getElementById('reg-dept-input').value = item.label;
    document.getElementById('reg-dept-code').value = item.code;
    if (org === '직영점') {
      // No name field for 직영점, nothing to fill
    }
    hideAC('reg-dept-ac');
    updateFinalCode();
  });
}

  const names = [...new Set(DATA.filter(d => d.org === '본사' && d.name).map(d => d.name))].sort();

function getNextNum(code, itemCode) {
  const existing = DATA.filter(d => d.code == code && d.itemCode == itemCode);
  if (existing.length === 0) return '001';
  const nums = existing.map(d => {
    const parts = (d.finalCode || '').split('-');
    const n = parseInt(parts[parts.length-1]) || 0;
    const n2 = parseInt(d.num) || 0;
    return Math.max(n, n2);
  });
  const maxNum = Math.max(...nums);
  return String(maxNum + 1).padStart(3, '0');
}

function updateFinalCode() {
  const code = document.getElementById('reg-dept-code').value;
  const itemCode = document.getElementById('reg-itemcode').value;
  const preview = document.getElementById('reg-finalcode-preview');
  if (!code || !itemCode) {
    preview.textContent = '—';
    return;
  }
  const num = getNextNum(code, itemCode);
  preview.textContent = code + '-' + itemCode + '-' + num;
}

function resetRegisterForm() {
  document.querySelector('input[name="reg-org"][value="본사"]').checked = true;
  document.getElementById('reg-dept-input').value = '';
  document.getElementById('reg-dept-code').value = '';
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-date').value = '';
  document.getElementById('reg-item').value = '';
  document.getElementById('reg-itemcode').value = '';
  document.getElementById('reg-finalcode-preview').textContent = '—';
  hideAC('reg-dept-ac');
  hideAC('reg-name-ac');
  hideAC('reg-item-ac');
  onRegOrgChange();
}

function submitRegister() {
  const org = document.querySelector('input[name="reg-org"]:checked').value;
  const code = document.getElementById('reg-dept-code').value;
  const deptInputVal = document.getElementById('reg-dept-input').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const date = document.getElementById('reg-date').value;
  const item = document.getElementById('reg-item').value.trim();
  const itemCode = document.getElementById('reg-itemcode').value;

  if (!code) { showToast(org === '본사' ? '부서를 선택하세요. (목록에서 선택)' : '직영점을 선택하세요. (목록에서 선택)', 'error'); return; }
  if (!item) { showToast('품목명을 입력하세요.', 'error'); return; }
  if (!itemCode) { showToast('품목 분류를 선택하세요.', 'error'); return; }
  if (!date) { showToast('취득일을 입력하세요.', 'error'); return; }

  let dept;
  if (org === '본사') {
    const found = DEPTS.find(d => d.code === code);
    dept = found ? found.name : code;
    if (!name) { showToast('사원명을 입력하세요.', 'error'); return; }
  } else {
    dept = '직영운영팀';
  }

  // Save custom item name if new
  const existingNames = getItemNamesForCode(itemCode);
  if (!existingNames.includes(item)) {
    addCustomItemName(itemCode, item);
  }

  const num = getNextNum(code, itemCode);
  const finalCode = code + '-' + itemCode + '-' + num;

  const newRecord = {
    org, dept,
    name: org === '직영점' ? (STORES.find(s => s.code === code) || {name: deptInputVal}).name : name,
    date, item, code, itemCode, num, finalCode
  };

  DATA.push(newRecord);
  saveData();
  initBonsaFilters();
  initJikFilters();

  showToast('자산이 등록되었습니다: ' + finalCode, 'success');
  resetRegisterForm();
}

// ===================== 부서/직영점별 선택 모달 =====================
function openDeptModal() {
  const body = document.getElementById('dept-modal-body');

  // 본사 부서 목록 (unique, 데이터 기반)
  const bonsaDepts = [...new Set(DATA.filter(d => d.org === '본사').map(d => d.dept).filter(Boolean))].sort();
  // 직영점 목록 (unique)
  const jikNames = [...new Set(DATA.filter(d => d.org === '직영점').map(d => d.name).filter(Boolean))].sort();

  let html = '';

  html += '<div class="dept-section-title">🏢 본사 부서</div>';
  html += '<div style="margin-bottom:6px;"><label style="font-size:12px;cursor:pointer;color:#4a90d9;">'
    + '<input type="checkbox" style="accent-color:#4a90d9;" onchange="deptModalSectionToggle(this,\'bonsa\')"> 본사 전체 선택/해제</label></div>';
  html += '<div class="dept-check-grid">';
  bonsaDepts.forEach(dept => {
    const cnt = DATA.filter(d => d.org === '본사' && d.dept === dept).length;
    html += `<label class="dept-check-item" onclick="this.classList.toggle('checked');updateDeptSelectInfo()">
      <input type="checkbox" class="dept-cb dept-cb-bonsa" data-type="bonsa" data-value="${escHtml(dept)}" onchange="updateDeptSelectInfo()">
      ${escHtml(dept)} <span style="color:#aaa;font-size:11px;">(${cnt})</span>
    </label>`;
  });
  html += '</div>';

  html += '<div class="dept-section-title">🏪 직영점</div>';
  html += '<div style="margin-bottom:6px;"><label style="font-size:12px;cursor:pointer;color:#4a90d9;">'
    + '<input type="checkbox" style="accent-color:#4a90d9;" onchange="deptModalSectionToggle(this,\'jik\')"> 직영점 전체 선택/해제</label></div>';
  html += '<div class="dept-check-grid">';
  jikNames.forEach(name => {
    const cnt = DATA.filter(d => d.org === '직영점' && d.name === name).length;
    html += `<label class="dept-check-item" onclick="this.classList.toggle('checked');updateDeptSelectInfo()">
      <input type="checkbox" class="dept-cb dept-cb-jik" data-type="jik" data-value="${escHtml(name)}" onchange="updateDeptSelectInfo()">
      ${escHtml(name)} <span style="color:#aaa;font-size:11px;">(${cnt})</span>
    </label>`;
  });
  html += '</div>';

  body.innerHTML = html;
  updateDeptSelectInfo();
  document.getElementById('dept-modal').classList.add('open');
}

function closeDeptModal() {
  document.getElementById('dept-modal').classList.remove('open');
}

function updateDeptSelectInfo() {
  const checked = document.querySelectorAll('.dept-cb:checked').length;
  document.getElementById('dept-select-info').textContent = checked + '개 선택';
}

function deptModalSectionToggle(masterCb, section) {
  const cls = section === 'bonsa' ? '.dept-cb-bonsa' : '.dept-cb-jik';
  document.querySelectorAll(cls).forEach(cb => {
    cb.checked = masterCb.checked;
    cb.closest('label').classList.toggle('checked', masterCb.checked);
  });
  updateDeptSelectInfo();
}

function deptModalSelectAll() {
  document.querySelectorAll('.dept-cb').forEach(cb => {
    cb.checked = true;
    cb.closest('label').classList.add('checked');
  });
  updateDeptSelectInfo();
}

function deptModalClearAll() {
  document.querySelectorAll('.dept-cb').forEach(cb => {
    cb.checked = false;
    cb.closest('label').classList.remove('checked');
  });
  updateDeptSelectInfo();
}

function applyDeptModal() {
  const selected = Array.from(document.querySelectorAll('.dept-cb:checked'));
  if (selected.length === 0) { showToast('부서 또는 직영점을 선택하세요.', 'error'); return; }

  stickerResults = [];
  selected.forEach(cb => {
    const type = cb.dataset.type;
    const val = cb.dataset.value;
    if (type === 'bonsa') {
      stickerResults.push(...DATA.filter(d => d.org === '본사' && d.dept === val));
    } else {
      stickerResults.push(...DATA.filter(d => d.org === '직영점' && d.name === val));
    }
  });

  closeDeptModal();
  renderStickerResults();
}

// ===================== 스티커 =====================
let stickerResults = [];

function onStickerSearchInput() {
  const val = document.getElementById('sticker-search').value.toLowerCase().trim();
  if (!val) { hideAC('sticker-search-ac'); return; }
  // Get unique names and store names
  const names = [...new Set(DATA.map(d => d.name).filter(Boolean))];
  const matches = names.filter(n => n.toLowerCase().includes(val)).slice(0, 20);
  showAC('sticker-search-ac', matches, function(item) {
    document.getElementById('sticker-search').value = item;
    hideAC('sticker-search-ac');
    searchStickers();
  });
}

function resetStickerSearch() {
  document.getElementById('sticker-search').value = '';
  hideAC('sticker-search-ac');
  stickerResults = [];
  document.getElementById('sticker-result-area').style.display = 'none';
  document.getElementById('sticker-results').innerHTML = '';
  document.getElementById('sticker-selected-count').textContent = '';
  document.getElementById('sticker-select-all').checked = false;
  updateStickerPrintBtn();
}

function searchStickers() {
  const q = document.getElementById('sticker-search').value.trim().toLowerCase();
  hideAC('sticker-search-ac');
  if (!q) { showToast('검색어를 입력하세요.', 'error'); return; }
  stickerResults = DATA.filter(d =>
    (d.name||'').toLowerCase().includes(q) ||
    (d.dept||'').toLowerCase().includes(q)
  );
  renderStickerResults();
}

function renderStickerResults() {
  const resultArea = document.getElementById('sticker-result-area');
  const resultsDiv = document.getElementById('sticker-results');
  const selCount = document.getElementById('sticker-selected-count');

  resultArea.style.display = 'block';
  document.getElementById('sticker-select-all').checked = false;
  selCount.textContent = '';

  if (stickerResults.length === 0) {
    resultsDiv.innerHTML = '<div class="no-data" style="padding:20px;color:#aaa;">검색 결과가 없습니다.</div>';
    updateStickerPrintBtn();
    return;
  }

  resultsDiv.innerHTML = stickerResults.map((d, i) => {
    const teamOrStore = d.org === '본사' ? (d.dept || '') : (d.name || '');
    const user = d.org === '본사' ? (d.name || '') : '-';
    return '<div class="sticker-item">' +
      '<input type="checkbox" class="sticker-cb" data-i="' + i + '" onchange="updateStickerCount()">' +
      '<div class="item-info">' +
        '<div class="item-finalcode">' + escHtml(d.finalCode) + '</div>' +
        '<div class="item-col"><span>소속팀:</span> ' + escHtml(teamOrStore) + '</div>' +
        '<div class="item-col"><span>품목:</span> ' + escHtml(d.item) + '</div>' +
        '<div class="item-col"><span>사용자:</span> ' + escHtml(user) + '</div>' +
        '<div class="item-col"><span>취득일:</span> ' + escHtml(formatDate(d.date)) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  updateStickerPrintBtn();
}

function updateStickerCount() {
  const checked = document.querySelectorAll('.sticker-cb:checked').length;
  const total = document.querySelectorAll('.sticker-cb').length;
  document.getElementById('sticker-selected-count').textContent =
    checked > 0 ? checked + '개 선택' : '';
  document.getElementById('sticker-select-all').checked = checked === total && total > 0;
  updateStickerPrintBtn();
}

function updateStickerPrintBtn() {
  const checked = document.querySelectorAll('.sticker-cb:checked').length;
  const btn = document.getElementById('sticker-print-btn');
  if (btn) btn.textContent = '\uD83D\uDDA8 선택한 항목 스티커 출력 (' + checked + '개)';
}

function toggleAllStickers(cb) {
  document.querySelectorAll('.sticker-cb').forEach(c => { c.checked = cb.checked; });
  updateStickerCount();
}

function printStickers() {
  const checked = document.querySelectorAll('.sticker-cb:checked');
  if (checked.length === 0) { showToast('출력할 스티커를 선택하세요.', 'error'); return; }

  const selectedItems = Array.from(checked).map(cb => stickerResults[parseInt(cb.dataset.i)]);

  const grid = document.getElementById('sticker-grid');
  grid.innerHTML = selectedItems.map(d => {
    const dateShort = formatDate(d.date);
    const dept = d.org === '본사' ? (d.dept || '') : (d.name || '');
    const user = d.org === '본사' ? (d.name || '') : '-';
    return '<div class="sticker-cell">' +
      '<div class="s-brand">HAKA KOREA</div>' +
      '<div class="s-code">' + escHtml(d.finalCode) + '</div>' +
      '<div class="s-row"><span>소속팀:</span> ' + escHtml(dept) + '</div>' +
      '<div class="s-row"><span>품목명:</span> ' + escHtml(getItemName(d.itemCode)) + '</div>' +
      '<div class="s-row"><span>모델명:</span> ' + escHtml(d.item) + '</div>' +
      '<div class="s-row"><span>취득일:</span> ' + escHtml(dateShort) + '</div>' +
      '<div class="s-row"><span>사용자:</span> ' + escHtml(user) + '</div>' +
    '</div>';
  }).join('');

  const printArea = document.getElementById('sticker-print-area');
  printArea.style.display = 'block';
  // sticker-page는 @media print에서만 보임, 여기선 inline display 필요 없음

  window.print();

  setTimeout(() => {
    printArea.style.display = 'none';
  }, 1000);
}

// ===================== TOAST =====================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}

// ===================== CLOSE AUTOCOMPLETE ON OUTSIDE CLICK =====================
document.addEventListener('click', function(e) {
  const acIds = ['reg-dept-ac', 'reg-name-ac', 'reg-item-ac', 'sticker-search-ac'];
  // reg-item-ac는 reg-itemcode select 클릭 시에도 닫히지 않게 예외 처리
  const extraExceptions = { 'reg-item-ac': 'reg-itemcode' };
  acIds.forEach(function(id) {
    const ac = document.getElementById(id);
    if (ac && !ac.contains(e.target)) {
      const inputMap = {
        'reg-dept-ac': 'reg-dept-input',
        'reg-name-ac': 'reg-name',
        'reg-item-ac': 'reg-item',
        'sticker-search-ac': 'sticker-search'
      };
      const inp = document.getElementById(inputMap[id]);
      const extra = extraExceptions[id] ? document.getElementById(extraExceptions[id]) : null;
      if ((!inp || !inp.contains(e.target)) && (!extra || !extra.contains(e.target))) {
        ac.style.display = 'none';
      }
    }
  });
});

// ===================== INIT =====================
function init() {
  loadData();
  initBonsaFilters();
  initJikFilters();
  renderBonsa();

  // Build item code dropdown for register
  const itemSel = document.getElementById('reg-itemcode');
  itemSel.innerHTML = '<option value="">선택하세요</option>' +
    ITEM_CODES.map(ic => '<option value="' + ic.code + '">' + ic.name + ' (' + ic.code + ')</option>').join('');

  // Modal close on overlay click
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  // Sticker search on Enter
  document.getElementById('sticker-search').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchStickers();
  });

  // Register form - initialize org
  onRegOrgChange();
}

// iframe 임베드 감지 — AMS 내부에서 열릴 때 다크 테마 + 사이드바 숨김 적용
if (window.self !== window.top) {
  document.body.classList.add('embedded');
}

init();

// AMS에서 postMessage로 탭 전환 요청 수신
window.addEventListener('message', function(e) {
  if (e.data && e.data.qqTab) {
    const t = {'page-bonsa':'본사 자산현황','page-jikyoung':'직영점 자산현황','page-register':'자산/직원 등록','page-sticker':'스티커 출력'};
    navigate(e.data.qqTab, t[e.data.qqTab] || '자산 관리');
  }
});
</script>
