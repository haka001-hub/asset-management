<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 수거 관리 시스템</title>
<style>
/* ═══ RESET & BASE ═══ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--sf:#171b26;--sf2:#1e2333;--sf3:#252a3a;
  --bd:#2a3045;--bd2:#343d57;
  --tx:#e8ecf4;--tx2:#9ba3bc;--tx3:#5c6480;
  --ac:#3b82f6;--ac2:#60a5fa;--gn:#10b981;--gn2:#34d399;
  --ye:#f59e0b;--ye2:#fbbf24;--rd:#ef4444;--rd2:#f87171;
  --pu:#8b5cf6;--pu2:#a78bfa;
  --r:8px;--r2:12px;--r3:16px;
  --sh:0 4px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;font-size:14px;min-height:100vh}

/* ═══ LAYOUT ═══ */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.tab-bar{display:flex;gap:2px;background:var(--sf3);border-radius:10px;padding:3px}
.tab-btn{padding:6px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:var(--tx2)}
.tab-btn.active{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.4)}
.content{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%}

/* ═══ CARDS ═══ */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:20px}
.card-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ═══ FORM ═══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr}
.form-grid.col1{grid-template-columns:1fr}
.fgrp{display:flex;flex-direction:column;gap:6px}
.fgrp.span2{grid-column:span 2}
.flb{font-size:12px;font-weight:600;color:var(--tx2);letter-spacing:.4px}
.flb span{color:var(--rd2);margin-left:2px}
.fi{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:13px;outline:none;transition:border-color .2s;width:100%}
.fi:focus{border-color:var(--ac)}
.fi:disabled{opacity:.5;cursor:not-allowed}
.fi-auto{background:var(--sf3);color:var(--tx2);font-family:monospace}
.fsel{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:13px;outline:none;width:100%;cursor:pointer}
.fsel:focus{border-color:var(--ac)}

/* ═══ AUTOCOMPLETE ═══ */
.acw{position:relative}
.acl{position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--r);max-height:200px;overflow-y:auto;z-index:200;display:none;box-shadow:var(--sh)}
.aci{padding:9px 12px;cursor:pointer;font-size:13px;transition:background .15s;border-bottom:1px solid var(--bd)}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.focused{background:rgba(59,130,246,.15);color:var(--ac2)}
.aci b{color:var(--ac2)}

/* ═══ BUTTONS ═══ */
.btn{padding:8px 16px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-pri{background:var(--ac);color:#fff}
.btn-pri:hover{background:var(--ac2)}
.btn-gst{background:var(--sf3);color:var(--tx2);border:1px solid var(--bd)}
.btn-gst:hover{color:var(--tx);border-color:var(--bd2)}
.btn-gn{background:var(--gn);color:#fff}
.btn-gn:hover{background:var(--gn2)}
.btn-ye{background:var(--ye);color:#fff}
.btn-ye:hover{background:var(--ye2)}
.btn-rd{background:var(--rd);color:#fff}
.btn-rd:hover{background:var(--rd2)}
.btn-pu{background:var(--pu);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:12px 28px;font-size:15px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ═══ BADGES ═══ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-wait{background:rgba(245,158,11,.15);color:var(--ye2);border:1px solid rgba(245,158,11,.3)}
.b-conf{background:rgba(59,130,246,.15);color:var(--ac2);border:1px solid rgba(59,130,246,.3)}
.b-pick{background:rgba(139,92,246,.15);color:var(--pu2);border:1px solid rgba(139,92,246,.3)}
.b-done{background:rgba(16,185,129,.15);color:var(--gn2);border:1px solid rgba(16,185,129,.3)}
.b-free{background:rgba(16,185,129,.1);color:var(--gn2)}
.b-paid{background:rgba(239,68,68,.1);color:var(--rd2)}
.b-col{background:rgba(156,163,175,.1);color:#9ca3af}

/* ═══ TABLE ═══ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--sf3)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--bd)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.tm{font-family:monospace;font-size:12px}
.tb{font-weight:600}

/* ═══ STATS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.s-total::before{background:var(--ac)}
.stat-card.s-wait::before{background:var(--ye)}
.stat-card.s-pick::before{background:var(--pu)}
.stat-card.s-done::before{background:var(--gn)}
.stat-num{font-size:28px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--tx2)}

/* ═══ FILTERS ═══ */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.sw{display:flex;align-items:center;gap:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 12px}
.sw input{background:transparent;border:none;outline:none;color:var(--tx);font-size:13px;width:200px}
.sic{color:var(--tx3);font-size:14px}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-chip.active{background:var(--ac);color:#fff;border-color:var(--ac)}

/* ═══ MODAL ═══ */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.md{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r3);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.md-hd{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--sf);z-index:10}
.md-ti{font-size:16px;font-weight:700}
.md-su{font-size:12px;color:var(--tx2);margin-top:3px}
.md-cl{background:transparent;border:none;color:var(--tx2);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px}
.md-cl:hover{background:var(--sf3);color:var(--tx)}
.md-bd{padding:20px 24px}
.md-ft{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--sf)}

/* ═══ ID TAG ═══ */
.id-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);border-radius:6px;padding:3px 10px;font-family:monospace;font-size:13px;font-weight:700;color:var(--ac2)}

/* ═══ NOTIFY ═══ */
.notif{position:fixed;bottom:24px;right:24px;background:var(--sf2);border:1px solid var(--bd2);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:var(--sh);max-width:360px}
.notif.show{transform:translateY(0);opacity:1}
.notif.ok{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1)}
.notif.err{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}
.notif.warn{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)}

/* ═══ SECTION DIVIDER ═══ */
.sec-title{font-size:13px;font-weight:700;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}

/* ═══ INFO ROW ═══ */
.info-row{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px}
.info-row .lbl{color:var(--tx3);font-size:12px;display:flex;align-items:center}
.info-row .val{font-weight:600}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:40px;color:var(--tx3)}
.empty-icon{font-size:36px;margin-bottom:10px}

/* ═══ REGION FILTER ═══ */
.region-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.rtab{padding:4px 14px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s}
.rtab.active{background:var(--sf3);color:var(--tx);border-color:var(--bd2)}

/* ═══ PROGRESS ═══ */
.progress-bar{height:4px;background:var(--sf3);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .form-grid.col3{grid-template-columns:1fr}
  .fgrp.span2{grid-column:span 1}
  .content{padding:12px}
  .filter-bar{gap:6px}
}
</style>
</head>
<body>
<div class="app">

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <span>AS 수거 관리 시스템</span>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('team',this)">👥 직영팀장</button>
    <button class="tab-btn" onclick="switchTab('hq',this)">🏢 본사</button>
  </div>
</div>

<!-- ══ CONTENT ══ -->
<div class="content">

  <!-- ━━━━━━━━━━━━━━━ 직영팀장 탭 ━━━━━━━━━━━━━━━ -->
  <div id="tab-team">
    <div style="display:grid;grid-template-columns:420px 1fr;gap:20px;align-items:start">

      <!-- 신청 폼 -->
      <div class="card" style="position:sticky;top:76px">
        <div class="card-title">✏️ AS 수거 신청</div>
        <div class="form-grid" style="gap:12px">

          <!-- 매장명 -->
          <div class="fgrp span2">
            <label class="flb">수거 매장명 <span>*</span></label>
            <div class="acw">
              <input class="fi" id="fStore" placeholder="매장명 입력..." autocomplete="off"
                oninput="acStore(this.value)" onfocus="acStore(this.value)">
              <div class="acl" id="acStoreList"></div>
            </div>
          </div>

          <!-- 자동값 -->
          <div class="fgrp">
            <label class="flb">식별번호 <small style="color:var(--tx3);font-weight:400">(자동부여)</small></label>
            <input class="fi fi-auto" id="fId" disabled placeholder="매장 선택 후 자동부여">
          </div>
          <div class="fgrp">
            <label class="flb">지역 <small style="color:var(--tx3);font-weight:400">(자동)</small></label>
            <input class="fi fi-auto" id="fRegion" disabled placeholder="자동">
          </div>
          <div class="fgrp">
            <label class="flb">배송코드 <small style="color:var(--tx3);font-weight:400">(자동)</small></label>
            <input class="fi fi-auto" id="fRoute" disabled placeholder="자동">
          </div>
          <div class="fgrp">
            <label class="flb">매장코드 <small style="color:var(--tx3);font-weight:400">(자동)</small></label>
            <input class="fi fi-auto" id="fCode" disabled placeholder="자동">
          </div>

          <!-- 구분 -->
          <div class="fgrp">
            <label class="flb">구분 <span>*</span></label>
            <select class="fsel" id="fDiv">
              <option value="">선택...</option>
              <option>즉시처리</option>
              <option>예외조치</option>
              <option>보상판매H</option>
              <option>보상판매R</option>
              <option>보상판매에어릭스</option>
              <option>본사별도수거</option>
            </select>
          </div>

          <!-- 유/무상 -->
          <div class="fgrp">
            <label class="flb">유/무상 <span>*</span></label>
            <select class="fsel" id="fCharge">
              <option value="">선택...</option>
              <option>무상</option>
              <option>유상</option>
              <option>수거</option>
            </select>
          </div>

          <!-- 제품명 -->
          <div class="fgrp span2">
            <label class="flb">제품명 <span>*</span></label>
            <div class="acw">
              <input class="fi" id="fProduct" placeholder="제품명 입력 또는 검색..." autocomplete="off"
                oninput="acProduct(this.value)" onfocus="acProduct(this.value)">
              <div class="acl" id="acProductList"></div>
            </div>
          </div>

          <!-- 수거개수 -->
          <div class="fgrp">
            <label class="flb">수거 개수 <span>*</span></label>
            <input class="fi" type="number" id="fQty" placeholder="0" min="1">
          </div>

          <!-- 확인일자 -->
          <div class="fgrp">
            <label class="flb">확인일자 <span>*</span></label>
            <input class="fi" type="date" id="fDate">
          </div>

          <!-- 메모 -->
          <div class="fgrp span2">
            <label class="flb">메모</label>
            <input class="fi" id="fMemo" placeholder="추가 메모 (선택)">
          </div>

        </div>

        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-gst" style="flex:1" onclick="resetForm()">초기화</button>
          <button class="btn btn-pri btn-lg" style="flex:2" onclick="submitAS()">📤 AS 수거 신청</button>
        </div>
      </div>

      <!-- 내 신청 이력 -->
      <div>
        <div class="card">
          <div class="card-title" style="justify-content:space-between">
            <span>📋 신청 이력</span>
            <div style="display:flex;gap:8px;align-items:center">
              <div class="sw"><span class="sic">⌕</span><input placeholder="매장/제품 검색..." oninput="renderTeamHist(this.value)" style="width:150px"></div>
            </div>
          </div>
          <div class="region-tabs" id="teamRegionTabs">
            <button class="rtab active" onclick="setTeamRegion('all',this)">전체</button>
          </div>
          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th>식별번호</th><th>매장명</th><th>지역</th>
                <th>구분</th><th>유/무상</th><th>제품명</th>
                <th>수량</th><th>확인일자</th><th>상태</th>
              </tr></thead>
              <tbody id="teamHistBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ━━━━━━━━━━━━━━━ 본사 탭 ━━━━━━━━━━━━━━━ -->
  <div id="tab-hq" style="display:none">

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card s-total">
        <div class="stat-num" id="st-total">0</div>
        <div class="stat-label">전체 신청</div>
      </div>
      <div class="stat-card s-wait">
        <div class="stat-num" id="st-wait">0</div>
        <div class="stat-label">최종확인 대기</div>
      </div>
      <div class="stat-card s-pick">
        <div class="stat-num" id="st-pick">0</div>
        <div class="stat-label">수거 진행중</div>
      </div>
      <div class="stat-card s-done">
        <div class="stat-num" id="st-done">0</div>
        <div class="stat-label">입고 완료</div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="filter-bar">
      <div class="sw"><span class="sic">⌕</span><input id="hqSrch" placeholder="식별번호/매장/제품 검색..." oninput="renderHQ()"></div>
      <button class="filter-chip active" onclick="setHQFilter('all',this)">전체</button>
      <button class="filter-chip" onclick="setHQFilter('pending',this)">⏳ 확인대기</button>
      <button class="filter-chip" onclick="setHQFilter('confirmed',this)">✅ 최종확인</button>
      <button class="filter-chip" onclick="setHQFilter('pickup',this)">🚚 수거중</button>
      <button class="filter-chip" onclick="setHQFilter('done',this)">✔ 입고완료</button>
    </div>
    <div class="region-tabs" id="hqRegionTabs">
      <button class="rtab active" onclick="setHQRegion('all',this)">전체 지역</button>
    </div>

    <!-- 테이블 -->
    <div class="card" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>식별번호</th><th>매장명</th><th>지역</th><th>배송코드</th>
            <th>구분</th><th>유/무상</th><th>제품명</th><th>수량</th>
            <th>확인일자</th><th>상태</th><th>액션</th>
          </tr></thead>
          <tbody id="hqBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /content -->
</div><!-- /app -->

<!-- ══ MODAL: 수거처리 ══ -->
<div class="mo" id="moPickup">
  <div class="md" style="max-width:480px">
    <div class="md-hd">
      <div><div class="md-ti">📦 수거 처리</div><div class="md-su" id="moPickupSub"></div></div>
      <button class="md-cl" onclick="closeMo('moPickup')">✕</button>
    </div>
    <div class="md-bd">
      <div class="form-grid col1" style="gap:12px">
        <div class="fgrp">
          <label class="flb">수거일자 <span>*</span></label>
          <input class="fi" type="date" id="pickupDate">
        </div>
        <div class="fgrp">
          <label class="flb">수거 담당자</label>
          <input class="fi" id="pickupMgr" placeholder="담당자명">
        </div>
        <div class="fgrp">
          <label class="flb">메모</label>
          <input class="fi" id="pickupMemo" placeholder="수거 관련 메모">
        </div>
      </div>
    </div>
    <div class="md-ft">
      <button class="btn btn-gst" onclick="closeMo('moPickup')">취소</button>
      <button class="btn btn-pu" onclick="confirmPickup()">🚚 수거 처리</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: 입고확인 ══ -->
<div class="mo" id="moInbound">
  <div class="md" style="max-width:480px">
    <div class="md-hd">
      <div><div class="md-ti">✔ 입고 확인</div><div class="md-su" id="moInboundSub"></div></div>
      <button class="md-cl" onclick="closeMo('moInbound')">✕</button>
    </div>
    <div class="md-bd">

// ═══ UTILS ═══
function notify(msg, type='ok'){
  const el = document.getElementById('notif');
  const icon = {ok:'✓', err:'✕', warn:'⚠'}[type] || '✓';
  document.getElementById('nIcon').textContent = icon;
  document.getElementById('nMsg').textContent = msg;
  el.className = `notif show ${type}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function openMo(id){
  document.getElementById(id).classList.add('open');
  activeModal = id;
}
function closeMo(id){
  document.getElementById(id).classList.remove('open');
  activeModal = null;
}

function today(){
  return new Date().toISOString().slice(0,10);
}
function fmtDate(d){
  if(!d) return '-';
  if(typeof d === 'string') return d;
  return d.toISOString?.().slice(0,10) || String(d);
}

// ═══ TAB ═══
function switchTab(tab, btn){
  document.getElementById('tab-team').style.display = tab==='team' ? '' : 'none';
  document.getElementById('tab-hq').style.display = tab==='hq' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='hq'){ renderHQ(); renderStats(); }
  else { renderTeamHist(); }
}

// ═══ AUTOCOMPLETE: 매장 ═══
function acStore(q){
  const list = document.getElementById('acStoreList');
  if(!q || q.length < 1){ list.style.display='none'; return; }
  const matches = Object.keys(STORE_MAP).filter(n => n.includes(q)).slice(0,12);
  if(!matches.length){ list.style.display='none'; return; }
  list.innerHTML = matches.map(n => {
    const info = STORE_MAP[n];
    const hi = n.replace(q, `<b>${q}</b>`);
    return `<div class="aci" onclick="selectStore('${n}')">${hi} <span style="color:var(--tx3);font-size:11px;margin-left:6px">${info.region} · ${info.route}</span></div>`;
  }).join('');
  list.style.display='';
}

function selectStore(name){
  const info = STORE_MAP[name];
  if(!info) return;
  document.getElementById('fStore').value = name;
  document.getElementById('fRegion').value = info.region;
  document.getElementById('fRoute').value = info.route;
  document.getElementById('fCode').value = info.code;
  // 식별번호 미리보기
  const nextNum = (regionCounters[info.region] || 0) + 1;
  document.getElementById('fId').value = `${info.region}-${String(nextNum).padStart(5,'0')} (제출 시 확정)`;
  document.getElementById('acStoreList').style.display='none';
}

  list.innerHTML = matches.map(p => {
    const hi = p.replace(re, m => `<b>${m}</b>`);
    return `<div class="aci" onclick="selectProduct('${p.replace(/'/g, "\\'")}')">${hi}</div>`;
  }).join('');
  list.style.display='';
}

function selectProduct(name){
  document.getElementById('fProduct').value = name;
  document.getElementById('acProductList').style.display='none';
}

// 클릭 외부 시 드롭다운 닫기
document.addEventListener('click', e => {
  if(!e.target.closest('.acw')){
    document.querySelectorAll('.acl').forEach(l => l.style.display='none');
  }
});

// ═══ RESET FORM ═══
function resetForm(){
  ['fStore','fProduct','fMemo'].forEach(id => document.getElementById(id).value='');
  ['fId','fRegion','fRoute','fCode'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fDiv').value='';
  document.getElementById('fCharge').value='';
  document.getElementById('fQty').value='';
  document.getElementById('fDate').value=today();
}

// ═══ SUBMIT ═══
function submitAS(){
  const store = document.getElementById('fStore').value.trim();
  const div = document.getElementById('fDiv').value;
  const charge = document.getElementById('fCharge').value;
  const product = document.getElementById('fProduct').value.trim();
  const qty = parseInt(document.getElementById('fQty').value) || 0;
  const date = document.getElementById('fDate').value;

  if(!store) { notify('수거 매장명을 선택해주세요','err'); return; }
  if(!STORE_MAP[store]) { notify('유효한 매장명을 선택해주세요','err'); return; }
  if(!div) { notify('구분을 선택해주세요','err'); return; }
  if(!charge) { notify('유/무상을 선택해주세요','err'); return; }
  if(!product) { notify('제품명을 입력해주세요','err'); return; }
  if(qty < 1) { notify('수거 개수를 입력해주세요','err'); return; }
  if(!date) { notify('확인일자를 입력해주세요','err'); return; }

  const info = STORE_MAP[store];
  const region = info.region;
  regionCounters[region] = (regionCounters[region] || 0) + 1;
  const seqId = `${region}-${String(regionCounters[region]).padStart(5,'0')}`;

  const item = {
    id: seqId,
    store, region,
    route: info.route,
    code: info.code,
    div, charge, product,
    qty, date,
    memo: document.getElementById('fMemo').value.trim(),
    status: 'pending',  // pending → confirmed → pickup → done
    submittedAt: new Date().toLocaleString('ko-KR'),
    confirmedAt: null,
    pickupDate: null, pickupMgr: null, pickupMemo: null,
    inboundQty: null, inboundDate: null, inboundMgr: null, inboundMemo: null,
  };

  AS_LIST.unshift(item);
  notify(`✅ 신청 완료! 식별번호: ${seqId}`, 'ok');
  resetForm();
  renderTeamHist();
  buildRegionTabs();
}

// ═══ TEAM HISTORY ═══
function setTeamRegion(r, btn){
  teamRegion = r;
  document.querySelectorAll('#teamRegionTabs .rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTeamHist();
}

function renderTeamHist(q=''){
  const body = document.getElementById('teamHistBody');
  let data = AS_LIST.filter(a => {
    const mq = !q || a.store.includes(q) || a.product.includes(q) || a.id.includes(q);
    const mr = teamRegion==='all' || a.region===teamRegion;
    return mq && mr;
  });

  if(!data.length){
    body.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">📭</div>신청 내역이 없습니다</div></td></tr>`;
    return;
  }
  body.innerHTML = data.map(a => `
    <tr>
      <td><span class="id-tag">${a.id}</span></td>
      <td class="tb">${a.store}</td>
      <td><span style="font-size:12px;color:var(--tx2)">${a.region}</span></td>
      <td style="font-size:12px">${a.div}</td>
      <td>${chargeBadge(a.charge)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.product}">${a.product}</td>
      <td class="tm">${a.qty}개</td>
      <td style="font-size:12px;color:var(--tx2)">${a.date}</td>
      <td>${statusBadge(a.status)}</td>
    </tr>`).join('');
}

// ═══ HQ RENDER ═══
function setHQFilter(f, btn){
  hqFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHQ();
}

function setHQRegion(r, btn){
  hqRegion = r;
  document.querySelectorAll('#hqRegionTabs .rtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHQ();
}

function renderHQ(){
  const q = (document.getElementById('hqSrch')?.value||'').trim();
  const body = document.getElementById('hqBody');
  let data = AS_LIST.filter(a => {
    const mf = hqFilter==='all' || a.status===hqFilter;
    const mr = hqRegion==='all' || a.region===hqRegion;
    const mq = !q || a.id.includes(q) || a.store.includes(q) || a.product.includes(q);
    return mf && mr && mq;
  });

  if(!data.length){
    body.innerHTML = `<tr><td colspan="11"><div class="empty"><div class="empty-icon">📭</div>해당 조건의 건이 없습니다</div></td></tr>`;
    return;
  }

  body.innerHTML = data.map(a => {
    const actions = buildActions(a);
    return `<tr>
      <td><span class="id-tag">${a.id}</span></td>
      <td class="tb">${a.store}</td>
      <td style="font-size:12px;color:var(--tx2)">${a.region}</td>
      <td><span class="tm" style="font-size:11px">${a.route}</span></td>
      <td style="font-size:12px">${a.div}</td>
      <td>${chargeBadge(a.charge)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.product}">${a.product}</td>
      <td class="tm">${a.qty}개</td>
      <td style="font-size:12px;color:var(--tx2)">${a.date}</td>
      <td>${statusBadge(a.status)}</td>
      <td style="white-space:nowrap">${actions}</td>
    </tr>`;
  }).join('');
  renderStats();
}

function buildActions(a){
  const btns = [];
  btns.push(`<button class="btn btn-gst btn-sm" onclick="openDetail('${a.id}')">상세</button>`);
  if(a.status==='pending')
    btns.push(`<button class="btn btn-sm" style="background:rgba(59,130,246,.15);color:var(--ac2);border:1px solid rgba(59,130,246,.3)" onclick="doConfirm('${a.id}')">✅ 최종확인</button>`);
  if(a.status==='confirmed')
    btns.push(`<button class="btn btn-pu btn-sm" onclick="openPickupModal('${a.id}')">📦 수거처리</button>`);
  if(a.status==='pickup')
    btns.push(`<button class="btn btn-gn btn-sm" onclick="openInboundModal('${a.id}')">✔ 입고확인</button>`);
  return btns.join(' ');
}

// ═══ ACTIONS ═══
function doConfirm(id){
  const a = AS_LIST.find(x=>x.id===id);
  if(!a) return;
  a.status = 'confirmed';
  a.confirmedAt = new Date().toLocaleString('ko-KR');
  notify(`[${id}] 최종확인 완료`, 'ok');
  renderHQ();
}

function openPickupModal(id){
  const a = AS_LIST.find(x=>x.id===id);
  if(!a) return;
  actionTarget = id;
  document.getElementById('moPickupSub').textContent = `${a.id} · ${a.store} · ${a.product}`;
  document.getElementById('pickupDate').value = today();
  document.getElementById('pickupMgr').value = '';
  document.getElementById('pickupMemo').value = '';
  openMo('moPickup');
}

function confirmPickup(){
  const a = AS_LIST.find(x=>x.id===actionTarget);
  if(!a) return;
  const d = document.getElementById('pickupDate').value;
  if(!d){ notify('수거일자를 입력해주세요','err'); return; }
  a.status = 'pickup';
  a.pickupDate = d;
  a.pickupMgr = document.getElementById('pickupMgr').value.trim();
  a.pickupMemo = document.getElementById('pickupMemo').value.trim();
  closeMo('moPickup');
  notify(`[${actionTarget}] 수거 처리 완료`, 'ok');
  renderHQ();
}

function openInboundModal(id){
  const a = AS_LIST.find(x=>x.id===id);
  if(!a) return;
  actionTarget = id;
  document.getElementById('moInboundSub').textContent = `${a.id} · ${a.store}`;
  document.getElementById('moInboundInfo').innerHTML = `
    <div class="info-row">
      <span class="lbl">제품명</span><span class="val">${a.product}</span>
      <span class="lbl">신청 수량</span><span class="val" style="color:var(--ac2)">${a.qty}개</span>
      <span class="lbl">수거일자</span><span class="val">${a.pickupDate||'-'}</span>
    </div>`;
  document.getElementById('inboundQty').value = a.qty;
  document.getElementById('inboundDate').value = today();
  document.getElementById('inboundMgr').value = '';
  document.getElementById('inboundMemo').value = '';
  openMo('moInbound');
}

function confirmInbound(){
  const a = AS_LIST.find(x=>x.id===actionTarget);
  if(!a) return;
  const qty = parseInt(document.getElementById('inboundQty').value)||0;
  const d = document.getElementById('inboundDate').value;
  if(qty<1){ notify('입고 수량을 입력해주세요','err'); return; }
  if(!d){ notify('수거확인일자를 입력해주세요','err'); return; }
  a.status = 'done';
  a.inboundQty = qty;
  a.inboundDate = d;
  a.inboundMgr = document.getElementById('inboundMgr').value.trim();
  a.inboundMemo = document.getElementById('inboundMemo').value.trim();
  if(qty !== a.qty){
    a.qtyMismatch = true;
    notify(`[${actionTarget}] 입고 완료 — ⚠️ 수량 불일치 (신청 ${a.qty}개 / 입고 ${qty}개)`, 'warn');
  } else {
    notify(`[${actionTarget}] 입고 완료 (${qty}개)`, 'ok');
  }
  closeMo('moInbound');
  renderHQ();
}

// ═══ DETAIL MODAL ═══
function openDetail(id){
  const a = AS_LIST.find(x=>x.id===id);
  if(!a) return;
  document.getElementById('moDetailSub').textContent = `${a.id} · ${a.store}`;
  document.getElementById('moDetailBody').innerHTML = `
    <div style="display:grid;gap:14px">
      <div>
        <div class="sec-title">기본 정보</div>
        <div class="info-row">
          <span class="lbl">식별번호</span><span><span class="id-tag">${a.id}</span></span>
          <span class="lbl">상태</span><span>${statusBadge(a.status)}</span>
          <span class="lbl">매장명</span><span class="val">${a.store}</span>
          <span class="lbl">지역/코드</span><span style="font-size:12px">${a.region} / ${a.code} / ${a.route}</span>
          <span class="lbl">구분</span><span class="val">${a.div}</span>
          <span class="lbl">유/무상</span><span>${chargeBadge(a.charge)}</span>
          <span class="lbl">제품명</span><span class="val">${a.product}</span>
          <span class="lbl">수거 개수</span><span class="val" style="color:var(--ac2)">${a.qty}개</span>
          <span class="lbl">확인일자</span><span>${a.date}</span>
          <span class="lbl">신청일시</span><span style="font-size:12px;color:var(--tx2)">${a.submittedAt}</span>
          ${a.memo ? `<span class="lbl">메모</span><span style="color:var(--tx2)">${a.memo}</span>` : ''}
        </div>
      </div>
      ${a.confirmedAt ? `
      <div>
        <div class="sec-title">최종확인</div>
        <div class="info-row">
          <span class="lbl">확인일시</span><span style="font-size:12px;color:var(--tx2)">${a.confirmedAt}</span>
        </div>
      </div>` : ''}
      ${a.pickupDate ? `
      <div>
        <div class="sec-title">수거 처리</div>
        <div class="info-row">
          <span class="lbl">수거일자</span><span class="val">${a.pickupDate}</span>
          <span class="lbl">담당자</span><span>${a.pickupMgr||'-'}</span>
          ${a.pickupMemo ? `<span class="lbl">메모</span><span style="color:var(--tx2)">${a.pickupMemo}</span>` : ''}
        </div>
      </div>` : ''}
      ${a.inboundDate ? `
      <div>
        <div class="sec-title">입고 확인</div>
        <div class="info-row">
          <span class="lbl">입고확인일자</span><span class="val">${a.inboundDate}</span>
          <span class="lbl">입고 수량</span><span class="val" style="color:${a.qtyMismatch?'var(--ye2)':'var(--gn2)'}">${a.inboundQty}개 ${a.qtyMismatch?'⚠️ 수량 불일치':''}</span>
          <span class="lbl">담당자</span><span>${a.inboundMgr||'-'}</span>
          ${a.inboundMemo ? `<span class="lbl">메모</span><span style="color:var(--tx2)">${a.inboundMemo}</span>` : ''}
        </div>
      </div>` : ''}
    </div>`;
  openMo('moDetail');
}

// ═══ STATS ═══
function renderStats(){
  document.getElementById('st-total').textContent = AS_LIST.length;
  document.getElementById('st-wait').textContent = AS_LIST.filter(a=>a.status==='pending').length;
  document.getElementById('st-pick').textContent = AS_LIST.filter(a=>a.status==='pickup').length;
  document.getElementById('st-done').textContent = AS_LIST.filter(a=>a.status==='done').length;
}

// ═══ REGION TABS ═══
function buildRegionTabs(){
  const regions = [...new Set(AS_LIST.map(a=>a.region))].sort();
  ['teamRegionTabs','hqRegionTabs'].forEach(tabId => {
    const el = document.getElementById(tabId);
    const isTeam = tabId === 'teamRegionTabs';
    const cur = isTeam ? teamRegion : hqRegion;
    const fn = isTeam ? 'setTeamRegion' : 'setHQRegion';
    el.innerHTML = `<button class="rtab ${cur==='all'?'active':''}" onclick="${fn}('all',this)">전체</button>`
      + regions.map(r => `<button class="rtab ${cur===r?'active':''}" onclick="${fn}('${r}',this)">${r}</button>`).join('');
  });
}

// ═══ BADGE HELPERS ═══
function statusBadge(s){
  const m = {
    pending: ['b-wait','⏳ 확인대기'],
    confirmed: ['b-conf','✅ 최종확인'],
    pickup: ['b-pick','🚚 수거중'],
    done: ['b-done','✔ 입고완료'],
  };
  const [cls,txt] = m[s] || ['b-wait','대기'];
  return `<span class="badge ${cls}">${txt}</span>`;
}

function chargeBadge(c){
  const m = {무상:'b-free 무상', 유상:'b-paid 유상', 수거:'b-col 수거'};
  const [cls,txt] = (m[c]||'b-col '+c).split(' ');
  return `<span class="badge ${cls}">${txt}</span>`;
}

// ═══ INIT ═══
document.getElementById('fDate').value = today();
renderTeamHist();
buildRegionTabs();
</script>
</body>
</html>
